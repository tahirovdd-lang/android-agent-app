name: Build CaseonePOS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Clean old outputs
        run: ./gradlew clean

      - name: Build CaseonePOS debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk CaseonePOS-1.0.2.apk

      - name: Upload CaseonePOS APK
        uses: actions/upload-artifact@v4
        with:
          name: CaseonePOS-APK
          path: CaseonePOS-1.0.2.apk
          if-no-files-found: error
          retention-days: 30
