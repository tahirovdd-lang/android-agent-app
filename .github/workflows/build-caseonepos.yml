name: Build and verify CaseonePOS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore and validate exact CaseonePOS logo
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="app/src/main/res/drawable-nodpi/caseonepos_original_logo.png"
          LOGO="app/src/main/res/drawable/caseonepos_logo.png"

          test -s "$SOURCE"
          tr -d '\r\n\t ' < "$SOURCE" | base64 --decode > "$LOGO"
          test -s "$LOGO"
          echo "bb6d3a3f36737e49061503a205550c206f4b8c1ca72466a066f735354c5e20f2  $LOGO" | sha256sum --check
          file "$LOGO" | grep -F "PNG image data, 640 x 640"

      - name: Validate project structure and branding references
        shell: bash
        run: |
          set -euo pipefail
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f app/build.gradle.kts
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/res/mipmap/caseonepos_icon.xml
          test -f app/src/main/res/mipmap-anydpi-v26/caseonepos_icon.xml
          grep -F 'android:icon="@mipmap/caseonepos_icon"' app/src/main/AndroidManifest.xml
          grep -F 'android:roundIcon="@mipmap/caseonepos_icon"' app/src/main/AndroidManifest.xml
          grep -F 'android:label="CaseonePOS"' app/src/main/AndroidManifest.xml
          grep -F '@drawable/caseonepos_logo' app/src/main/res/values-v31/themes.xml

      - name: Build CaseonePOS debug APK
        run: gradle --no-daemon clean :app:assembleDebug --stacktrace

      - name: Verify APK identity and packaged branding
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"

          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          AAPT="$BUILD_TOOLS/aapt"
          test -x "$AAPT"

          "$AAPT" dump badging "$APK" | tee apk-verification.txt
          grep -F "package: name='uz.caseonepos.app' versionCode='4' versionName='1.0.3'" apk-verification.txt
          grep -F "application-label:'CaseonePOS'" apk-verification.txt
          grep -F "application-icon-" apk-verification.txt

          "$AAPT" dump resources "$APK" | tee apk-resources.txt
          grep -F "caseonepos_logo" apk-resources.txt
          grep -F "caseonepos_icon" apk-resources.txt

          sha256sum "$APK" | tee apk-sha256.txt
          cp "$APK" CaseonePOS-1.0.3.apk

      - name: Upload verified CaseonePOS APK
        uses: actions/upload-artifact@v4
        with:
          name: CaseonePOS-APK-1.0.3
          path: |
            CaseonePOS-1.0.3.apk
            apk-verification.txt
            apk-resources.txt
            apk-sha256.txt
          if-no-files-found: error
          retention-days: 30
